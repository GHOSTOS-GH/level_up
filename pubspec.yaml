name: level_up
description: "Level Up ! - Application de motivation sportive gamifiée 100% offline."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  flutter_haptic_feedback: ^1.0.1
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  intl: ^0.20.2
  uuid: ^4.5.1
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  flutter_timezone: ^4.1.0
  file_picker: ^10.3.10           # ← ajout du ^ manquant

  # Isar : la lib native DOIT être présente pour Android/iOS
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1    # ← AJOUT CRITIQUE (était totalement absent !)

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  isar_generator: ^3.1.0+1       # ← retiré de dependencies (code-gen uniquement)
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/logo/